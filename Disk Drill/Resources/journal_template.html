<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/>
<style>
li img { max-width: 320px; }
a+img { display: block; border: 1px solid black }

span.bold-part { font-weight: bold }
span.italic-part { font-style: italic }
span.strikeout-part { text-decoration: line-through; }
span.underline-part { text-decoration: underline; }

p.bold-part { font-weight: bold }
p.italic-part { font-style: italic }
p.strikeout-part { text-decoration: line-through; }
p.underline-part { text-decoration: underline; }
p.right-part { text-align: end; }
p.center-part { text-align: center; }
p.justify-part { text-align: justify; }
</style>

</head><body>

<div>
<span dd-id="title-part">TITLE</span>
</div>
<hr/>
<p dd-id="content">CONTENT</p>


<ul>

<li dd-id="file">
  <a dd-id="file-link" href="URL">FILENAME</a>
  <img dd-id="file-thumb" src="URL"></img>
</li>

</ul>


</body></html>
