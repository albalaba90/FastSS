<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/>
<style>
li img { max-width: 320px; }
span.missed-file { color: red }
span.missed-file+img { display: block; border: 1px solid black }
a+img { display: block; border: 1px solid black }
</style>

</head><body>

<p>Note <span dd-id="title">TITLE</span></p>

<hr/>

<pre dd-id="plain-text"></pre>

<ul>

<li dd-id="file">
  <a dd-id="file-link" href="URL">FILENAME</a>
  <img dd-id="file-thumb" src="URL"></img>
</li>

<li dd-id="missed">
  <span dd-id="missed-name" class="missed-file">FILENAME</span>
  <img dd-id="missed-thumb" src="URL"></img>
</li>

</ul>

</body></html>
