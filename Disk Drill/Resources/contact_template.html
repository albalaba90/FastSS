<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/>
<style>
body { font-family: arial }
table.card {
  table-layout: fixed;
  width: 100%;
  border-collapse: collapse;
  border: 1px solid black;
}
table.card tr { border: none; }
table.card td {
  vertical-align: top;
  border: 1px solid gray;
}
table.card td:nth-child(1) { width: 18ex; text-align: right; padding-right: 0.5ex }
table.card td:nth-child(2) { padding-left: 0.5ex }
table.card td img { max-width: 64px; }
div.name-value { font-weight: bold; }
div.field-name { text-color: grey; }
div.field-value { }
</style>

</head><body>

<p>vCard <a dd-id="vcard-file" href="URL">VCF</a></p>

<table class="card">
<tr>
  <td>
    <img dd-id="card-logo" src="URL"></img>
  </td>
  <td dd-id="names">
    <div dd-id="names-N" class="name-value">N</div>
    <div dd-id="names-FN" class="field-value">FN</div>
    <div dd-id="names-ORG" class="name-value">ORG</div>
    <div dd-id="names-TITLE" class="field-value">TITLE</div>
  </td>
</tr>

<tr dd-id="field">
  <td> <div dd-id="field-name" class="field-name">FNAME</div> </td>
  <td>
    <div dd-id="field-text" class="field-value">FTEXT</div>
    <div dd-id="field-ADR">
      <div dd-id="adr-street" class="field-value">STREET</div>
      <div>
        <span dd-id="adr-city" class="field-value">CITY</span>
        <span dd-id="adr-zip" class="field-value">ZIP</span>
      </div>
      <div>
        <span dd-id="adr-state" class="field-value">STATE</span>
        <span dd-id="adr-country" class="field-value">COUNTRY</span>
      </div>
    </div>
    <div dd-id="field-IMPP">
      <span dd-id="impp-userid" class="field-value">USER_ID</span>
      <span dd-id="impp-imservice" class="field-value">IM_SERVICE</span>
    </div>
  </td>
</tr>

</table>

</body></html>
