<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/>
<style>
table.transcript {
  table-layout: fixed;
  width: 100%;
  border-collapse: collapse;
  border: 1px solid black;
}
table.transcript tr { border: none; }
table.transcript td {
  vertical-align: top;
  border: 1px solid black;
}
table.transcript td:nth-child(1) { width: 18ex; }
table.transcript td img { max-width: 320px; }
table.transcript td video { max-width: 320px; }
span.peer-name:not(:empty) { display: block; font-weight: bold; font-size: 10pt; color: darkblue; }
span.missed-file { color: red }
span.missed-file+img { display: block }
</style>

</head><body>

<p>Chat <span dd-id="title">TITLE</span></p>
<p>Participant(s): <span dd-id="peers">PEERS</span></p>
<p>Transcript <a dd-id="transcript-file" href="URL">CSV</a></p>

<table class="transcript">
<tr dd-id="message">
  <td dd-id="message-timestamp">DATE</td>
  <td>
    <span dd-id="message-peer-text">TEXT</span>
    <span dd-id="message-peer-name" class="peer-name">PEER</span>
  </td>
  <td dd-id="message-me">TEXT</td>
</tr>

<tr dd-id="file">
  <td dd-id="file-timestamp">DATE</td>
  <td>
    <a dd-id="file-peer-link" href="URL">FILENAME</a>
    <span dd-id="file-peer-name" class="peer-name">PEER</span>
  </td>
  <td><a dd-id="file-me" href="URL">FILENAME</a></td>
</tr>

<tr dd-id="missed">
  <td dd-id="missed-timestamp">DATE</td>
  <td>
    <span dd-id="missed-peer-link" class="missed-file">FILENAME</span>
    <img dd-id="missed-peer-thumb" src="URL"></img>
    <span dd-id="missed-peer-name" class="peer-name">PEER</span>
  </td>
  <td>
    <span dd-id="missed-me" class="missed-file">FILENAME</span>
    <img dd-id="missed-thumb" src="URL"></img>
  </td>
</tr>

<tr dd-id="picture">
  <td dd-id="picture-timestamp">DATE</td>
  <td>
    <img dd-id="picture-peer-link" src="URL"></img>
    <span dd-id="picture-peer-name" class="peer-name">PEER</span>
  </td>
  <td><img dd-id="picture-me" src="URL"></img></td>
</tr>

<tr dd-id="voice">
  <td dd-id="voice-timestamp">DATE</td>
  <td>
    <audio dd-id="voice-peer-link" src="URL" controls=""/>
    <span dd-id="voice-peer-name" class="peer-name">PEER</span>
  </td>
  <td><audio dd-id="voice-me" src="URL" controls=""/></td>
</tr>

<tr dd-id="clip">
  <td dd-id="clip-timestamp">DATE</td>
  <td>
    <video dd-id="clip-peer-link" src="URL" controls=""/>
    <span dd-id="clip-peer-name" class="peer-name">PEER</span>
  </td>
  <td><video dd-id="clip-me" src="URL" controls=""/></td>
</tr>

</table>

</body></html>
