<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/>
<style>
table.cards {
  table-layout: fixed;
  width: 100%;
  border-collapse: collapse;
  border: 1px solid black;
}
table.cards tr { border: none; }
table.cards td {
  vertical-align: top;
  border: 1px solid black;
}
table.cards td:nth-child(1) { width: 18ex; }
table.cards td img { max-width: 64px; }
span.field-label { font-weight: bold; }
span.field-value { white-space: pre-wrap; font-family: monospace }
</style>

</head><body>

<table class="cards">
<tr dd-id="card">
  <td>
    <img dd-id="card-logo" src="URL"></img>
  </td>
  <td>
    <div dd-id="card-field">
      <span dd-id="field-label" class="field-label">LABEL</span>
      <span dd-id="field-value" class="field-value">VALUE</span>
    </div>
  </td>
</tr>

</table>

</body></html>
